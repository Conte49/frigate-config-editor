name: Bug report
description: Report a problem with the Frigate Config Editor panel
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please provide as much
        context as possible. Do not paste raw Frigate credentials or
        secrets into this issue.
  - type: input
    id: panel-version
    attributes:
      label: Panel version
      description: The release tag you installed (e.g. v0.1.0).
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: 2026.4.0
    validations:
      required: true
  - type: input
    id: frigate-version
    attributes:
      label: Frigate version
      placeholder: 0.16.1
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the panel.
        2. ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant Frigate config (anonymised)
      description: Redact IPs, URLs, credentials before pasting.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Browser console logs
      render: shell
