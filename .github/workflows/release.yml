name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build front-end bundle
        run: pnpm build

      - name: Sanity-check the bundled file is in place
        run: |
          ls -lh custom_components/frigate_config_editor/www/frigate-config-editor.js

      - name: Zip the custom_components folder
        run: |
          cd custom_components/frigate_config_editor
          zip -r ../../frigate_config_editor.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frigate_config_editor.zip
            custom_components/frigate_config_editor/www/frigate-config-editor.js
          generate_release_notes: true
          body_path: CHANGELOG.md
          draft: false
          make_latest: 'true'
          fail_on_unmatched_files: true
