name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage (enforce thresholds)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Verify integration layout
        run: |
          test -f custom_components/frigate_config_editor/__init__.py
          test -f custom_components/frigate_config_editor/manifest.json
          test -f custom_components/frigate_config_editor/www/frigate-config-editor.js

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: frigate-config-editor-bundle
          path: custom_components/frigate_config_editor/www/frigate-config-editor.js
          if-no-files-found: error
          retention-days: 7

  hacs-validation:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS action
        uses: hacs/action@main
        with:
          category: integration
